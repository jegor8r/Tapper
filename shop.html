<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapper Shop</title>
    <link rel="stylesheet" href="shopStyle.css">
</head>
<body>
    <header>
        <div id="HPBox">
            <p id="HPValue">❤ 100 HP</p>
        </div>
        <div id="levelBox">
            <p id="levelValue">⚓Level 1</p>
        </div>
        <div id="ScoreBox">
            <p id="ScoreValue">★ Score: 0</p>
        </div>
        <div id="moodBox">
            <div id="moodIcon"><img src="pictures/Dolphin/Face/DolphinHappyMood.png" alt="moodIcon"></div>
        </div>
    </header>
    <div class="categories" id = "categories">
        <div class="Skins" id="SkinsBox">
            <img src="https://cdn-icons-png.flaticon.com/512/9742/9742755.png" alt="SkinsIcon" category="Skins">
            <p>Skins</p>
        </div>
        <div class="PowerUps" id="PowerUpsBox">
            <img src="https://cdn-icons-png.magnific.com/256/18823/18823983.png?semt=ais_white_label" alt="PowerUpsIcon" category="PowerUps">
            <p>Power-Ups</p>
        </div>
        <div class="Fish" id="FishBox">
            <img src="https://cdn-icons-png.flaticon.com/512/8620/8620879.png" alt="FishIcon" category="Fish">
            <p>Fish</p>
        </div>
    </div>
    <div id="itemsContainer">
        <div class="item" data-category="Skins">
            <img src="https://www.agnoulitahats.com/cdn/shop/files/Classic-Top-Hat-For-Men-in-Black-Fur-Felt-The-Victorian-Agnoulita-Hats-3_317e81b5-fc6e-4673-83d8-52227ff612a8.webp?v=1763137355&width=1060" alt="Hat">
            <p>Hat</p>
            <button class="buyButton">Buy</button>
        </div>
        <div class="item" data-category="Skins">
            <img src="https://amtools.lv/146358-home_default/automatic-darkening-welding-googles-with-face-mask-alt3.jpg" alt="Mask">
            <p>Mask</p>
            <button class="buyButton">Buy</button>
        </div>
        <div class="item" data-category="Skins">
            <img src="https://www.freeiconspng.com/thumbs/beard-png/beard-png-image--beard-png-image-6.png" alt="Beard">
            <p>Beard</p>
            <button class="buyButton">Buy</button>
        </div>
        <div class="item" data-category="Skins">
            <img src="https://static.vecteezy.com/system/resources/thumbnails/059/320/164/small/luxurious-dark-brown-handlebar-mustache-on-transparent-background-png.png" alt="Mustache">
            <p>Mustache</p>
            <button class="buyButton">Buy</button>
        </div>
    </div>
    <script src="SaveLogic.js"></script>
    <script src="shopScript.js"></script>
</body>
</html>
