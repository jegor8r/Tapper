<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapper Shop</title>
    <link rel="stylesheet" href="shopStyle.css">
</head>
<body>
    <header>
        <div id="HPBox">
            <p id="HPValue">❤ 100 HP</p>
        </div>
        <div id="levelBox">
            <p id="levelValue">⚓Level 1</p>
        </div>
        <div id="ScoreBox">
            <p id="ScoreValue">★ Score: 0</p>
        </div>
        <div id="moodBox">
            <div id="moodIcon"><img src="pictures/Dolphin/Face/DolphinHappyMood.png" alt="moodIcon"></div>
        </div>
    </header>
    <div class="categories" id = "categories">
        <div class="Skins" id="SkinsBox">
            <img src="https://cdn-icons-png.flaticon.com/512/9742/9742755.png" alt="SkinsIcon">
            <p>Skins</p>
        </div>
        <div class="PowerUps" id="PowerUpsBox">
            <img src="https://cdn-icons-png.magnific.com/256/18823/18823983.png?semt=ais_white_label" alt="PowerUpsIcon">
            <p>Power-Ups</p>
        </div>
        <div class="Fish" id="FishBox">
            <img src="https://cdn-icons-png.flaticon.com/512/8620/8620879.png" alt="FishIcon">
            <p>Fish</p>
        </div>
    </div>
    <div id="itemsContainer">
        <!-- Items will be dynamically added here -->
    </div>
    <script src="SaveLogic.js"></script>
</body>
</html>
