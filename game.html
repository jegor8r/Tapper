<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapper</title>
    <link rel="stylesheet" href="GameStyle.css">
</head>
<body>
    <header>
        <div id="HPBox">
            <p id="HPValue">❤ 100 HP</p>
        </div>
        <div id="levelBox">
            <p id="levelValue">⚓Level 1</p>
        </div>
        <div id="ScoreBox">
            <p id="ScoreValue">★ Score: 0</p>
        </div>
        <div id="moodBox">
            <div id="moodIcon"><img src="pictures/DolphinHappyMood.png" alt="moodIcon"></div>
        </div>
    </header>
    <div class="Dolphin">
        <img src="pictures/DolphinWatching.png" alt="Dolphin" id="DolphinButton">
    </div>
    <div class="mapBox">
        <img src="pictures/MapIcon.png" alt="MapIcon" id="MapIcon">
    </div>
    <div class="LinkBox">
        <div id="shopBox"></div>
        <div id="gamesBox"></div>
        <div id="socialBox"></div>
        <div id="settingsBox"></div>
    </div>
<script src="GameScript.js"></script>
</body>
</html>
