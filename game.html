<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapper</title>
    <link rel="stylesheet" href="GameStyle.css">
</head>
<body>
    <header>
        <div id="HPBox">
            <p id="HPValue">❤ 100 HP</p>
        </div>
        <div id="levelBox">
            <p id="levelValue">⚓Level 1</p>
        </div>
        <div id="ScoreBox">
            <p id="ScoreValue">★ Score: 0</p>
        </div>
        <div id="moodBox">
            <div id="moodIcon"><img src="pictures/Dolphin/Face/DolphinHappyMood.png" alt="moodIcon"></div>
        </div>
    </header>
    <div class="Dolphin">
        <img src="pictures/Dolphin/DolphinWatching.png" alt="Dolphin" id="DolphinButton">
    </div>
    <div class="mapBox">
        <img src="pictures/Icon/MapIcon.png" alt="MapIcon" id="MapIcon">
    </div>
    <div class="Store">
    <h1>Store</h1>
        <div class="LinkBox">
            <div id="shopBox">
                <img src="pictures/Icon/ShopIcon.png" alt="ShopIcon">
            </div>
            <div id="gamesBox">
                <img src="https://static.thenounproject.com/png/1750426-200.png" alt="GamesIcon">
            </div>
            <div id="socialBox">
                <img src="https://cdn-icons-png.flaticon.com/512/921/921305.png" alt="SocialIcon">
            </div>
            <div id="settingsBox">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/ea/Settings_%28iOS%29.png?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original" alt="SettingsIcon">
            </div>
        </div>
    </div>
<script src="GameScript.js"></script>
</body>
</html>
